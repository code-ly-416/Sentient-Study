<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentient Study - Delete Session</title>

    <!-- Google Fonts: Inter and Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- External CSS -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <header>
        <div class="logo">
            <span class="material-symbols-rounded">psychology</span>
            SentientStudy
        </div>
        <div id="globalStatus" class="status-badge">System Ready</div>
    </header>

    <div class="container">
        <div class="view active">
            <button class="back-btn" onclick="goToDashboard()">
                <span class="material-symbols-rounded">arrow_back</span>
                Back to Dashboard
            </button>

            <div class="details-header">
                <h2 id="confirmTitle" style="font-size: 1.75rem; margin-bottom: 0.25rem; color: var(--warning);">Delete Session</h2>
                <p id="confirmMessage" style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem;">Are you sure you want to delete this session?</p>
            </div>

            <div class="control-panel" style="justify-content: center; gap: 1rem;">
                <button id="cancelDeleteBtn" class="btn-secondary" onclick="goToDashboard()">
                    <span class="material-symbols-rounded">cancel</span>
                    Cancel
                </button>
                <button id="confirmDeleteBtn" class="btn-danger" onclick="confirmDelete()">
                    <span class="material-symbols-rounded">delete</span>
                    Delete Permanently
                </button>
            </div>
        </div>
    </div>

    <!-- External JavaScript Files -->
    <script src="scripts/api.js"></script>
    <script src="scripts/ui.js"></script>
</body>
</html>
