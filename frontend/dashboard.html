<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentient Study - Dashboard</title>

    <!-- Google Fonts: Inter and Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- External CSS -->
    <link rel="stylesheet" href="styles/main.css">

    <!-- Chart.js for graphing -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <div class="logo">
            <span class="material-symbols-rounded">psychology</span>
            SentientStudy
        </div>
        <nav class="top-nav">
            <a class="nav-button active" href="/">Dashboard</a>
            <a class="nav-button" href="/details.html">Analytics</a>
        </nav>
        <div id="globalStatus" class="status-badge">System Ready</div>
    </header>

    <div class="container">
        <!-- DASHBOARD VIEW -->
        <div id="dashboardView" class="view active">
            <section class="dashboard-hero">
                <div class="session-timer">
                    <div class="timer-label">Session Duration</div>
                    <div id="sessionTimer" class="timer-display">00:00:00</div>
                </div>
                <div class="record-controls">
                    <button id="newSessionBtn" class="record-button" onclick="showNewSessionModal()">
                        <span class="material-symbols-rounded">fiber_manual_record</span>
                        Start Recording
                    </button>
                    <button id="stopBtn" class="record-button stop" style="display: none;" onclick="stopSession()">
                        <span class="material-symbols-rounded">stop</span>
                        Stop Recording
                    </button>
                </div>
            </section>

            <section class="dashboard-section">
                <div class="section-header">
                    <h2>Recent Sessions</h2>
                </div>
                <div class="grid" id="sessionList">
                    <div class="empty-state">Loading your sessions...</div>
                </div>
            </section>

            <section class="dashboard-section live-feed">
                <div class="section-header">
                    <h2>Live Activity Feed</h2>
                </div>
                <div class="live-feed-body">Coming Soon: Real-time AI observations will appear here.</div>
            </section>
        </div>
    </div>

    <!-- New Session Modal Overlay -->
    <div id="newSessionModal" class="modal-overlay" style="display: none;" onclick="closeModalOnOverlay(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Start New Session</h3>
            </div>
            <div class="modal-body">
                <input type="text" id="sessionNameInput" placeholder="Enter session title..." />
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cancelNewSession()">
                    <span class="material-symbols-rounded">cancel</span>
                    Cancel
                </button>
                <button class="btn-primary" onclick="confirmNewSession()">
                    <span class="material-symbols-rounded">check</span>
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- External JavaScript Files - Loaded in order: API, Charts, UI -->
    <script src="scripts/api.js"></script>
    <script src="scripts/charts.js"></script>
    <script src="scripts/ui.js"></script>
</body>
</html>
