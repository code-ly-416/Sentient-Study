<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentient Study - Session Details</title>

    <!-- Google Fonts: Inter and Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />

    <!-- External CSS -->
    <link rel="stylesheet" href="styles/main.css">

    <!-- Chart.js for graphing -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <div class="logo">
            <span class="material-symbols-rounded">psychology</span>
            SentientStudy
        </div>
        <nav class="top-nav">
            <a class="nav-button" href="/">Dashboard</a>
            <a class="nav-button active" href="/details.html">Analytics</a>
        </nav>
        <div id="globalStatus" class="status-badge">Operational</div>
    </header>

    <div class="container">
        <!-- SESSION DETAILS VIEW -->
        <div id="detailsView" class="view active">
            <div class="details-top">
                <button class="back-btn" onclick="goToDashboard()">
                    <span class="material-symbols-rounded">arrow_back</span>
                    Back to Dashboard
                </button>

                <div class="details-header">
                    <h2 id="detailTitle">Session Name</h2>
                    <p id="detailDate">Date</p>
                </div>
                <div class="session-selector">
                    <label for="sessionSelector">Session</label>
                    <select id="sessionSelector"></select>
                </div>
            </div>

            <div class="details-layout">
                <div class="details-main">
                    <div class="kpi-grid">
                        <div class="kpi-card engagement">
                            <div class="kpi-title">Avg. Engagement</div>
                            <div id="avgEngagementValue" class="kpi-value">--%</div>
                            <div id="avgEngagementTrend" class="kpi-meta">Trend: --</div>
                        </div>
                        <div class="kpi-card frustration">
                            <div class="kpi-title">Peak Frustration</div>
                            <div id="peakFrustrationValue" class="kpi-value">--%</div>
                            <div id="peakFrustrationTime" class="kpi-meta">Time: --</div>
                        </div>
                        <div class="kpi-card topic">
                            <div class="kpi-title">Key Topic</div>
                            <div id="keyTopicValue" class="kpi-value">--</div>
                            <div class="kpi-meta">OCR-derived</div>
                        </div>
                    </div>

                    <!-- Main Analytics Chart -->
                    <div class="analytics-card wide">
                        <div class="chart-tabs" data-active="engagement">
                            <button class="chart-tab active" data-chart="engagement" onclick="switchChart('engagement')">Engagement</button>
                            <button class="chart-tab" data-chart="confusion" onclick="switchChart('confusion')">Confusion</button>
                            <button class="chart-tab" data-chart="frustration" onclick="switchChart('frustration')">Frustration</button>
                        </div>
                        <div class="chart-canvas">
                            <canvas id="analyticsChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Friction Points Sidebar -->
                <aside class="context-area friction-sidebar">
                    <div class="sidebar-header">
                        <span class="material-symbols-rounded">warning</span>
                        Key Friction Points
                    </div>
                    <div id="frictionPointsList" class="friction-list">
                        <div class="empty-state">No friction points detected yet.</div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <!-- External JavaScript Files - Loaded in order: API, Charts, UI -->
    <script src="scripts/api.js"></script>
    <script src="scripts/charts.js"></script>
    <script src="scripts/ui.js"></script>

    <div id="contextModal" class="modal-overlay" style="display: none;" onclick="closeContextModalOnOverlay(event)">
        <div class="modal-content text-inspector">
            <div class="modal-header">
                <h3 id="modalTimeMarker">Friction Point Context</h3>
                <button class="modal-close-btn" onclick="closeContextModal()">&times;</button>
            </div>
              <div class="modal-body">
                  <h4>Telemetry Context</h4>
                  <div id="modalDescriptionBody" class="inspector-box"></div>
              </div>
        </div>
    </div>
</body>
</html>
